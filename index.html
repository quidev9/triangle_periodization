<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Треугольник Периодизации v5.6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📐 Треугольник Периодизации</h1>
    
    <div id="error-msg" class="error">❌ Ошибка геометрии: С такими весами треугольник сил невозможен!</div>

    <div class="inputs-grid">
        <div class="input-group">
            <label for="bench_a">Горизонт (А), кг</label>
            <input type="number" id="bench_a" value="50">
        </div>
        <div class="input-group">
            <label for="smith_b">Смит 30° (B), кг</label>
            <input type="number" id="smith_b" value="40">
        </div>
        <div class="input-group">
            <label for="incline_c">Наклон своб. (C), кг</label>
            <input type="number" id="incline_c" value="30">
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <div class="chart-title" style="color: #4a4a4a;">ТЕКУЩИЙ БАЛАНС</div>
            <svg id="svg_current"></svg>
        </div>
        <div class="chart-box">
            <div class="chart-title" style="color: var(--accent-green);">ПРОГНОЗ РОСТА (+10 кг в углах)</div>
            <svg id="svg_target"></svg>
        </div>
    </div>

    <div class="verdict-box" id="verdict">
        Ждем расчетов...
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
